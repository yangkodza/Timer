<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณเวลา & เวลาสิ้นสุด</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f6f9; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 95vh;
        }
        .card { 
            background: white; 
            padding: 30px 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 420px; 
            margin-top: 10px; 
        }
        h2 { 
            text-align: center; 
            color: #212529; 
            margin-bottom: 25px; 
            font-size: calc(16px + 1vw); 
            white-space: nowrap;         
            font-weight: 700;
        }
        .input-group { 
            margin-bottom: 20px; 
        }
        .input-group label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: bold; 
            color: #495057; 
            font-size: 14px;
        }
        .time-inputs { 
            display: flex; 
            gap: 12px; 
        }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #ced4da; 
            border-radius: 10px; 
            font-size: 16px; 
            text-align: center; 
            background-color: #fff;
            color: #212529;
            transition: border-color 0.15s ease-in-out;
        }
        input:focus { border-color: #007bff; outline: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background-color 0.2s; 
            margin-bottom: 15px;
        }
        button:hover { background-color: #0056b3; }
        
        .result { 
            padding: 18px; 
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            border-radius: 10px; 
            text-align: center; 
            font-size: 18px; 
            font-weight: bold; 
            display: none; 
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .endtime-box {
            padding: 18px;
            background-color: #e2f0fe;
            border: 1px solid #b8daff;
            color: #004085;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            display: none;
            line-height: 1.6;
        }
        #install_btn { background-color: #28a745; display: none; }
        #install_btn:hover { background-color: #218838; }
        .status-text { text-align: center; font-size: 12px; color: #6c757d; margin-top: -5px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>⏱️ คำนวณเวลา & เวลาสิ้นสุด</h2>
    <div id="noti_status" class="status-text">กำลังตั้งค่าระบบแจ้งเตือน...</div>
    
    <button id="install_btn">📲 ติดตั้งแอปคำนวณเวลา</button>

    <div class="input-group">
        <label>1. เวลาที่มีอยู่ตอนนี้</label>
        <div class="time-inputs">
            <input type="number" id="current_hr" placeholder="ชั่วโมง" min="0">
            <input type="number" id="current_min" placeholder="นาที" min="0" max="59">
        </div>
    </div>

    <div class="input-group">
        <label>2. เวลาที่ต้องการทั้งหมด</label>
        <div class="time-inputs">
            <input type="number" id="target_hr" placeholder="ชั่วโมง" min="0">
            <input type="number" id="target_min" placeholder="นาที" min="0" max="59">
        </div>
    </div>

    <button onclick="calculateTimeAndEnd()">คำนวณเวลา</button>

    <div class="result" id="result_box"></div>
    <div class="endtime-box" id="endtime_box"></div>
    
    <button id="voice_assist_btn" onclick="openVoiceAssistant()" style="display:none; background-color: #ffc107; color: #212529; margin-top: 10px;">
        🎙️ กดแล้วพูด: "ตั้งปลุก [เวลาที่คำนวณได้]"
    </button>
</div>

<script>
let alarmTimer = null;

window.addEventListener('load', () => {
    if ('Notification' in window) {
        Notification.requestPermission().then(permission => {
            let statusDiv = document.getElementById('noti_status');
            if (permission === 'granted') {
                statusDiv.innerHTML = "✅ ระบบแจ้งเตือนทะลุจอพร้อมใช้งาน";
                statusDiv.style.color = "#28a745";
            } else {
                statusDiv.innerHTML = "⚠️ โปรดอนุญาตสิทธิ์แจ้งเตือนเพื่อให้ระบบดังเมื่อสลับแอป";
                statusDiv.style.color = "#dc3545";
            }
        });
    }
});

function calculateTimeAndEnd() {
    if (alarmTimer) clearTimeout(alarmTimer);

    let currentHr = parseInt(document.getElementById('current_hr').value) || 0;
    let currentMin = parseInt(document.getElementById('current_min').value) || 0;
    let targetHr = parseInt(document.getElementById('target_hr').value) || 0;
    let targetMin = parseInt(document.getElementById('target_min').value) || 0;

    let currentTotalMinutes = (currentHr * 60) + currentMin;
    let targetTotalMinutes = (targetHr * 60) + targetMin;

    let resultBox = document.getElementById('result_box');
    let endtimeBox = document.getElementById('endtime_box');
    let voiceBtn = document.getElementById('voice_assist_btn');
    
    resultBox.style.display = "block";

    if (currentTotalMinutes >= targetTotalMinutes) {
        resultBox.style.backgroundColor = "#d4edda";
        resultBox.style.border = "1px solid #c3e6cb";
        resultBox.style.color = "#155724";
        resultBox.innerHTML = "🎉 ครบจำนวนเวลาที่ต้องการแล้ว!";
        endtimeBox.style.display = "none";
        voiceBtn.style.display = "none";
    } else {
        let remainingMinutes = targetTotalMinutes - currentTotalMinutes;
        let diffHr = Math.floor(remainingMinutes / 60);
        let diffMin = remainingMinutes % 60;

        resultBox.style.backgroundColor = "#fff3cd";
        resultBox.style.border = "1px solid #ffeeba";
        resultBox.style.color = "#856404";
        resultBox.innerHTML = `⏳ เหลือเวลาอีก:<br><span style="font-size: 24px; color: #dc3545; font-weight: 800;">${diffHr} ชั่วโมง ${diffMin} นาที</span>`;

        let now = new Date();
        now.setMinutes(now.getMinutes() + remainingMinutes);

        let endHr = String(now.getHours()).padStart(2, '0');
        let endMin = String(now.getMinutes()).padStart(2, '0');

        endtimeBox.style.display = "block";
        endtimeBox.innerHTML = `🏁 จะครบกำหนดตอนเวลาประมาณ:<br><span style="font-size: 26px; color: #004085; font-weight: 800;">${endHr}:${endMin} น.</span>`;
        
        // แสดงปุ่มสั่งงานด้วยเสียงทันทีหลังคำนวณเสร็จ
        voiceBtn.style.display = "block";

        let msRemaining = remainingMinutes * 60 * 1000;
        alarmTimer = setTimeout(triggerAlarm, msRemaining);
    }
}

function openVoiceAssistant() {
    // คำสั่งยิงตรงไปปลุก Google Assistant บนเครื่อง Android ทันที
    window.location.href = "intent://#Intent;action=android.intent.action.VOICE_COMMAND;end";
}

function triggerAlarm() {
    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification("⏱️ เวลาของครบกำหนดแล้ว!", {
            body: "ครบจำนวนเวลาที่ตั้งไว้เรียบร้อยแล้ว กรุณาตรวจสอบ",
            icon: "https://cdn-icons-png.flaticon.com/512/2088/2088617.png",
            requireInteraction: true
        });
    }

    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let count = 0;
    const totalBeeps = 30;

    function playBeep() {
        if (count >= totalBeeps) return;

        if ('vibrate' in navigator) {
            navigator.vibrate(600);
        }

        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
        
        gain.gain.setValueAtTime(1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6); 

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.6); 

        count++;
        setTimeout(playBeep, 1000);
    }

    playBeep();
}

// ระบบลงทะเบียน PWA
if ('serviceWorker' in navigator) {
    navigator.worker.register('sw.js').catch(err => console.log("SW error:", err));
}

let deferredPrompt;
const installBtn = document.getElementById('install_btn');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            installBtn.style.display = 'none';
        }
        deferredPrompt = null;
    }
});
</script>

</body>
</html>
